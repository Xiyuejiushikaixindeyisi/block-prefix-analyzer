#   First miss terminates the prefix. This is stricter than the paper's definition.
# Role: parallel comparison against f4_traceA_public_reusable; do NOT present as
#   the paper's Figure 4 main result.

trace_name: traceA
input_file: data/public/qwen_traceA_blksz_16.jsonl
hit_metric: content_prefix_reuse
bin_size_seconds: 60
output_dir: outputs/paper_repro/f4_traceA_public_prefix
figure_variant: supplementary_prefix_aware_view
note_public_adaptation: "2-hour trace-relative window, Trace A only"
